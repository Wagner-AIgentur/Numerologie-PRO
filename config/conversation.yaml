    - q_de: "Ist Numerologie wissenschaftlich?"
      a_de: "Die Psychomatrix nach Pythagoras ist ein Werkzeug zur Selbstreflexion und Potenzialanalyse, basierend auf mathematischen Mustern. Es ist keine exakte Wissenschaft, aber viele Menschen sind überrascht, wie treffend die Beschreibungen sind."
