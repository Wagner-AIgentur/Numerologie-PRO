# ============================================================
# Lead Qualification (Everlast Challenge: min. 4 Kriterien)
# ============================================================
lead_qualification:
  criteria:
    - name: interest_area
      weight: 25
      question_de: "Was führt Sie zu uns? (Beziehung, Beruf, Kind, Finanzen, Zukunft, Neugier)"
      question_ru: "Что привело вас к нам? (Отношения, карьера, ребёнок, финансы, будущее, интерес)"
      scoring:
        high: "Konkretes Problem/Anliegen"
        medium: "Allgemeines Interesse"
        low: "Nur neugierig/schaut sich um"

    - name: experience_level
      weight: 15
      question_de: "Haben Sie schon einmal eine Numerologie-Beratung gemacht?"
      question_ru: "Вы уже обращались к нумерологу?"
      scoring:
        high: "Ja, kennt Numerologie und will vertiefen"
        medium: "Nein, aber sehr interessiert"
        low: "Skeptisch / nur aus Spaß"

    - name: budget_readiness
      weight: 25
      question_de: "Möchten Sie erstmal etwas Kleines ausprobieren oder direkt eine ausführliche Beratung?"
      question_ru: "Хотите начать с чего-то небольшого или сразу полноценную консультацию?"
      scoring:
        high: "Direkt Beratung (€79-179)"
        medium: "Erstmal Erstgespräch oder PDF (€9.99-19)"
        low: "Nur kostenlos / kein Budget"

    - name: timeline
      weight: 20
      question_de: "Wann würden Sie gerne starten?"
      question_ru: "Когда бы вы хотели начать?"
      scoring:
        high: "Sofort / diese Woche"
        medium: "In den nächsten Wochen"
        low: "Kein konkreter Zeitplan"

    - name: decision_authority
      weight: 10
      question_de: "Entscheiden Sie das selbst oder möchten Sie sich mit jemandem besprechen?"
      question_ru: "Вы решаете сами или хотите посоветоваться с кем-то?"
      scoring:
        high: "Entscheide selbst"
        medium: "Bespreche mit Partner"
        low: "Muss erst überlegen"

    - name: engagement
      weight: 5
      question_de: "(Intern bewertet: Wie engagiert ist der Anrufer im Gespräch?)"
      question_ru: "(Внутренняя оценка: Насколько вовлечён звонящий в разговор?)"
      scoring:
        high: "Stellt viele Fragen, sehr interessiert"
        medium: "Hört zu, fragt wenig"
        low: "Einsilbig, scheint desinteressiert"

  scoring:
    grade_a: 70   # Hot: Sofort Erstgespräch buchen oder Paket empfehlen
    grade_b: 40   # Warm: Erstgespräch oder PDF anbieten
    # < 40         Cold: Website/Rechner empfehlen, kein Push
