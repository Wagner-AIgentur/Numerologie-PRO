# ============================================================
# Voice Agent — Conversation Configuration (DSGVO-konform)
# Numerologie PRO | Swetlana Wagner
# ============================================================
# Single Source of Truth für die Gesprächslogik des Voice Agents.
# Änderungen hier wirken beim nächsten Call via ElevenLabs API.
#
# DSGVO Plan A (Audio Saving AUS):
# - KI-Kennzeichnung in jeder Begrüßung (EU AI Act Art. 50 Abs. 4)
# - Audio Saving deaktiviert → kein Recording-Consent nötig
# - Human Handover jederzeit möglich (Art. 22 DSGVO)
# - Datenminimierung: Nur geschäftsrelevante Daten erfasst
# - Transkript-Retention: 90 Tage
# - Rechtsgrundlage: Berechtigtes Interesse (Art. 6 Abs. 1 lit. f)
# - Multi-Agent Architektur: Main Classifier + 3 Subagents
# - Prompts: siehe elevenlabs/prompts/
# ============================================================

agent:
  name: "Lisa"
  persona: |
    Du bist Lisa, die freundliche KI-Assistentin von Numerologie PRO.
    Du hilfst Anrufern, das passende Numerologie-Paket zu finden,
    beantwortest Fragen zur Psychomatrix-Analyse nach Pythagoras und
    buchst kostenlose Erstgespräche mit Swetlana Wagner.

    Du sprichst warm, empathisch und verständnisvoll — wie eine gute
    Freundin, die sich mit Numerologie auskennt. Du bist keine
    Wahrsagerin, sondern erklärst die Psychomatrix als fundierte
    Persönlichkeitsanalyse basierend auf dem Geburtsdatum.

    Dein Ziel: Den Bedarf des Anrufers verstehen, das passende Paket
    empfehlen und ein kostenloses Erstgespräch mit Swetlana buchen.

  rules:
    - "Sei immer warm, empathisch und verständnisvoll"
    - "Stelle maximal 2 Fragen hintereinander, dann fasse zusammen"
    - "Empfehle immer das passendste Paket basierend auf dem Bedarf"
    - "Wenn unsicher welches Paket — Empfehle das kostenlose Erstgespräch"
    - "Dränge nie aggressiv auf einen Kauf"
    - "Sprich in der Sprache des Anrufers (DE/RU wird automatisch erkannt)"
    - "Identifiziere dich IMMER als KI-Assistentin zu Beginn"
    - "Hole Einwilligung zur Datenverarbeitung ein bevor du Daten erfragst"
    - "Biete jederzeit an, zu Swetlana persoenlich weiterzuleiten"
    - "Erfasse nur geschaeftsrelevante Daten (Datenminimierung)"
    - "Gib niemals persoenliche Daten anderer Kunden weiter"

# ============================================================
# DSGVO / Privacy Configuration
# ============================================================
privacy:
  ai_disclosure: true
  audio_saving: false  # DSGVO Plan A: Audio Saving AUS → kein Recording-Consent nötig
  consent_required: false  # Kein Recording-Consent nötig da Audio Saving AUS
  human_handover: true
  data_retention_days: 90  # Transkript-Retention: 90 Tage (ElevenLabs Advanced > Data Retention)
  pii_fields_collected:
    - name
    - email
    - phone
    - birthdate
  legal_basis: "legitimate_interest"
  privacy_policy_url: "https://numerologie-pro.com/datenschutz"
  text_normalisation_type: "elevenlabs"  # TTS-Normalizer statt System-Prompt-Normalizer

  human_handover_messages:
    de: "Kein Problem! Ich leite Sie gerne an Swetlana weiter. Einen Moment bitte."
    ru: "Конечно! Я соединю вас со Светланой. Одну минуту, пожалуйста."

  decline_messages:
    de: "Kein Problem! Besuchen Sie gerne unsere Website numerologie-pro.com. Vielen Dank für Ihren Anruf!"
    ru: "Нет проблем! Заходите на наш сайт numerologie-pro.com. Спасибо за ваш звонок!"

