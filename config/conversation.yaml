      q_ru: "Можно ли подарить консультацию?"
      a_ru: "Да! Свяжитесь с нами по info@numerologie-pro.com, и мы создадим персонализированный подарочный сертификат."

    - q_de: "Brauche ich Vorkenntnisse?"
      a_de: "Nein, überhaupt nicht! Swetlana erklärt alles Schritt für Schritt. Die Beratung ist auch für komplette Anfänger geeignet."
      q_ru: "Нужны ли предварительные знания?"
